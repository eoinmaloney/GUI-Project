<!DOCTYPE html>
<html>
    <head>
        <!-- BOOTSTRAP INTEGRATION Eoin-->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <!-- CSS Linking-->
        <link rel="stylesheet" href="../css/template.css">
        <link rel="stylesheet" href="../css/sign-up.css">
        <title>Sign Up</title>
    </head>
    <body>
        <!-- PAGE TITLE Eoin-->
        <div class="page-title">
            LUMOS
            <i class="bi bi-lightbulb-fill"></i>
        </div>
    
        <div class="home-banner">
            <div id="index">
                <a href="index.html"> Home </a>
            </div>
            <div id="profile">
                <a href="profile.html"> Profile </a>
            </div>
            <div id="sign-up">
                <a href="sign-up.html"> Sign-up </a>
            </div>
        </div>

        <div id="sign-up-continer">

            <br><br><br><br><br>

            <!-- LOGIN SECTION Finn-->
            <h2 id="sign-up-label">Login</h2>
            <div>
                <label id="email-title" for="login-email">Email:</label>
                <input id="login-email" type="email">
            </div>
            <br>
            <div>
                <label id="password-title" for="login-password">Password:</label>
                <input id="login-password" type="password">
            </div>
            <br>
            <button onclick="login()">Login</button>
            <p id="login-message"></p>

            <hr style="border-color: white; width: 80%; margin: 20px auto;">

            <!-- SIGN UP SECTION Finn-->
            <h2 id="sign-up-label">Create Account</h2>
            <div>
                <label id="email-title" for="email">Email:</label>
                <input id="email" type="email">
            </div>
            <br>
            <div>
                <label id="username-title" for="username">Username:</label>
                <input id="username" type="username">
            </div>
            <br>
            <div>
                <label id="password-title" for="password">Password:</label>
                <input id="password" type="password">
            </div>
            <br>
            <button onclick="saveSignup()">Create Account</button>

            <p id="message"></p>
        </div>

        <script src="../js/sign-up.js"></script>
    
    </body>
</html>
